<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>
body {display:flex; justify-content:center; align-items:center; height:100vh;}
.signup-body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(to right, #3498db, #6dd5fa);
}

.signup-container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}

.signup-container input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

.signup-container button {
    width: 100%;
    background: #3498db;
    color: white;
}
</style>

</head>
<body class="signup-body">

<form class="signup-container" onsubmit="signup(event)"> 
<h2>Signup</h2>
<input id="newUser" placeholder="Email"><br>
<input id="newPass" type="password" placeholder="password"><br>
<button type="submit">Signup</button>
</form>

<script src="script.js"></script>
</body>
</html>
